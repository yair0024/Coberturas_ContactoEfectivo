<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zonas de Cobertura · Contacto Efectivo</title>
<meta name="description" content="Mapa interactivo de zonas de cobertura de Contacto Efectivo: locales en Jalisco y rutas foraneas a Nayarit y Colima.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --navy:      #0b1a2e;
  --navy2:     #122040;
  --navy3:     #1b2d52;
  --gold:      #c9a94b;
  --gold-l:    #e2c97a;
  --gold-d:    #8a6e28;
  --azure:     #5ea3d0;
  --azure-l:   #9ac7e2;
  --azure-d:   #2f5d7a;
  --cream:     #f5f0e8;
  --white:     #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family:'Barlow',sans-serif; background:var(--navy); color:var(--white); overflow:hidden; }

/* ---------- HEADER ---------- */
header {
  position:fixed; top:0; left:0; right:0; z-index:1000;
  height:70px;
  background:linear-gradient(90deg, var(--navy) 0%, var(--navy2) 100%);
  border-bottom:1.5px solid var(--gold-d);
  display:flex; align-items:center; gap:16px; padding:0 24px;
  box-shadow:0 4px 30px rgba(0,0,0,0.5);
}
.logo-img {
  width:52px; height:52px; border-radius:10px;
  border:1.5px solid var(--gold-d);
  object-fit:cover; flex-shrink:0;
}
.brand h1 {
  font-family:'Playfair Display',serif;
  font-size:1.25rem; line-height:1.1;
  color:var(--white);
}
.brand h1 em { color:var(--gold); font-style:normal; }
.brand p {
  font-size:0.68rem; font-weight:300; letter-spacing:.14em;
  text-transform:uppercase; color:rgba(255,255,255,.45); margin-top:2px;
}
.header-right {
  margin-left:auto; display:flex; align-items:center; gap:10px;
}
.count-badge {
  border:1px solid var(--gold-d); padding:5px 12px; border-radius:20px;
  font-size:0.7rem; font-weight:500; letter-spacing:.06em;
  text-transform:uppercase; white-space:nowrap;
  background:rgba(201,169,75,.12); color:var(--gold-l);
  display:flex; align-items:center; gap:6px;
}
.count-badge .dot { width:8px; height:8px; border-radius:2px; }
.count-badge.locales  .dot { background:var(--gold); }
.count-badge.foraneas .dot { background:transparent; border:1.5px dashed var(--gold-l); }

.website-link {
  color:rgba(255,255,255,.5); font-size:0.7rem; font-weight:300;
  text-decoration:none; letter-spacing:.04em;
  transition:color .2s; margin-left:4px;
}
.website-link:hover { color:var(--gold-l); }

/* ---------- MAP ---------- */
#map {
  position:fixed; top:70px; left:0; right:0; bottom:0;
  z-index:1;
}

/* ---------- SIDEBAR ---------- */
#sidebar {
  position:fixed; top:70px; right:0; bottom:0;
  width:280px; z-index:500;
  background:linear-gradient(180deg, rgba(11,26,46,.97) 0%, rgba(18,32,64,.97) 100%);
  border-left:1.5px solid rgba(201,169,75,.2);
  display:flex; flex-direction:column;
  backdrop-filter:blur(8px);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
#sidebar.collapsed { transform:translateX(100%); }

.sidebar-header {
  padding:14px 18px 10px;
  border-bottom:1px solid rgba(201,169,75,.15);
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-header span {
  font-size:.7rem; font-weight:500; letter-spacing:.14em;
  text-transform:uppercase; color:var(--gold);
}
.sidebar-toggle-btn {
  background:none; border:none; cursor:pointer;
  color:rgba(255,255,255,.5); font-size:1rem; line-height:1;
  padding:2px 4px; transition:color .2s;
}
.sidebar-toggle-btn:hover { color:var(--white); }

#zone-list {
  flex:1; overflow-y:auto; padding:8px 0;
}
#zone-list::-webkit-scrollbar { width:4px; }
#zone-list::-webkit-scrollbar-track { background:transparent; }
#zone-list::-webkit-scrollbar-thumb { background:var(--gold-d); border-radius:2px; }

/* Category group */
.zone-group { margin-bottom:6px; }
.group-header {
  padding:10px 18px 8px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; user-select:none;
  transition:background .2s;
}
.group-header:hover { background:rgba(255,255,255,.03); }
.group-title {
  display:flex; align-items:center; gap:8px;
  font-size:.68rem; font-weight:600; letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--gold-l);
}
.group-swatch {
  width:10px; height:10px; border-radius:2px;
}
.group-header.locales  .group-swatch { background:var(--gold); }
.group-header.foraneas .group-swatch {
  background:transparent;
  border:1.5px dashed var(--gold-l);
}
.group-actions { display:flex; align-items:center; gap:8px; }
.group-count {
  font-size:.62rem; color:rgba(255,255,255,.4);
  font-weight:400; letter-spacing:.08em;
}
.group-toggle {
  width:30px; height:16px;
  border-radius:10px;
  background:rgba(255,255,255,.1);
  position:relative; cursor:pointer;
  transition:background .2s;
  flex-shrink:0;
}
.group-toggle::before {
  content:''; position:absolute; top:2px; left:2px;
  width:12px; height:12px; border-radius:50%;
  background:rgba(255,255,255,.5);
  transition:all .25s cubic-bezier(.4,0,.2,1);
}
.group-toggle.on { background:rgba(201,169,75,.35); }
.group-toggle.on::before { left:16px; background:var(--gold-l); }

.group-items { display:block; }
.group-items.hidden { display:none; }

.zone-item {
  display:flex; align-items:center; gap:10px;
  padding:7px 18px 7px 28px; cursor:pointer;
  transition:background .15s;
  border-left:3px solid transparent;
}
.zone-item:hover { background:rgba(255,255,255,.04); }
.zone-item.active {
  background:rgba(201,169,75,.08);
  border-left-color:var(--gold);
}
.zone-dot {
  width:12px; height:12px; border-radius:3px;
  flex-shrink:0; opacity:.9;
}
.zone-dot.foranea {
  border-radius:3px;
  border:1.5px dashed currentColor;
  background:transparent !important;
}
.zone-name {
  font-size:.78rem; font-weight:400; line-height:1.25;
  color:rgba(255,255,255,.82);
}
.zone-item.active .zone-name { color:var(--white); font-weight:500; }

.sidebar-footer {
  padding:12px 18px;
  border-top:1px solid rgba(201,169,75,.12);
  font-size:.62rem; color:rgba(255,255,255,.3);
  line-height:1.5; text-align:center;
}

/* ---------- FLOAT TOGGLE ---------- */
#open-sidebar-btn {
  position:fixed; top:82px; right:0; z-index:600;
  background:var(--navy2); border:1.5px solid var(--gold-d);
  border-right:none; color:var(--gold-l);
  padding:8px 10px; border-radius:8px 0 0 8px;
  cursor:pointer; font-size:.78rem;
  display:none; align-items:center; gap:6px;
  font-family:'Barlow',sans-serif; font-weight:500;
  box-shadow:-4px 4px 18px rgba(0,0,0,.3);
  transition:background .2s;
}
#open-sidebar-btn:hover { background:rgba(201,169,75,.12); }
#open-sidebar-btn.visible { display:flex; }

/* ---------- LEGEND ---------- */
#legend {
  position:fixed; bottom:18px; left:18px; z-index:400;
  background:rgba(11,26,46,.92);
  border:1px solid rgba(201,169,75,.25);
  border-radius:10px;
  padding:10px 14px;
  font-size:.68rem;
  backdrop-filter:blur(8px);
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.legend-title {
  font-family:'Playfair Display',serif;
  font-size:.78rem; color:var(--gold-l);
  margin-bottom:6px; letter-spacing:.04em;
}
.legend-row {
  display:flex; align-items:center; gap:8px;
  padding:3px 0; color:rgba(255,255,255,.75);
}
.legend-swatch {
  width:18px; height:12px; border-radius:2px;
  flex-shrink:0;
}
.legend-swatch.local {
  background:rgba(201,169,75,.28);
  border:1.5px solid var(--gold);
}
.legend-swatch.foranea {
  background:rgba(201,169,75,.14);
  border:1.5px dashed var(--gold-l);
}

/* ---------- POPUP ---------- */
.leaflet-popup-content-wrapper {
  background:var(--navy2) !important;
  border:1.5px solid var(--gold-d) !important;
  border-radius:10px !important;
  box-shadow:0 8px 32px rgba(0,0,0,.5) !important;
  color:var(--white) !important;
}
.leaflet-popup-content-wrapper.foranea-popup {
  border-style:dashed !important;
}
.leaflet-popup-tip { background:var(--navy2) !important; }
.popup-zone-name {
  font-family:'Playfair Display',serif;
  font-size:1rem; color:var(--gold-l); margin-bottom:4px;
}
.popup-label {
  font-size:.68rem; color:rgba(255,255,255,.5);
  font-weight:300; letter-spacing:.08em; text-transform:uppercase;
}

/* ---------- ATTRIBUTION ---------- */
.leaflet-control-attribution {
  background:rgba(11,26,46,.8) !important;
  color:rgba(255,255,255,.3) !important;
  font-size:.58rem !important;
}
.leaflet-control-attribution a { color:rgba(201,169,75,.6) !important; }

/* ---------- LOADER ---------- */
#loader {
  position:fixed; inset:0; z-index:2000;
  background:var(--navy);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; transition:opacity .4s;
}
#loader.hidden { opacity:0; pointer-events:none; }
.loader-text {
  font-family:'Playfair Display',serif;
  color:var(--gold-l); font-size:1.1rem; letter-spacing:.04em;
}
.loader-bar {
  width:180px; height:2px; background:rgba(255,255,255,.08);
  border-radius:2px; overflow:hidden;
}
.loader-bar::after {
  content:''; display:block; width:40%; height:100%;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
  animation:slide 1.2s infinite;
}
@keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }

/* ---------- RESPONSIVE ---------- */
@media (max-width:680px) {
  header { padding:0 14px; gap:10px; }
  .brand h1 { font-size:1rem; }
  .brand p { font-size:.6rem; }
  .header-right { gap:6px; }
  .count-badge { padding:4px 8px; font-size:.62rem; }
  .website-link { display:none; }
  #sidebar { width:240px; }
  #legend { bottom:12px; left:12px; font-size:.62rem; }
}
</style>
</head>

// ---------- MAP INIT ----------
const map = L.map('map', {
  center: [20.9, -103.8],
  zoom: 8,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19,
}).addTo(map);

// ---------- PALETAS ----------
// Paleta vibrante: un color distinto por poligono (curada para contrastar sobre fondo navy)
// Locales (11) - zonas del AMG, borde solido, relleno opaco
const PALETTE_LOCAL = [
  '#ff6b6b', // coral
  '#4ecdc4', // turquesa
  '#ffe66d', // amarillo pastel
  '#ff8c42', // naranja
  '#c77dff', // violeta
  '#06d6a0', // esmeralda
  '#ff006e', // magenta
  '#3a86ff', // azul
  '#8ecae6', // azul claro
  '#80ed99', // verde claro
  '#fee440', // amarillo brillante
];
// Foraneas (12) - fuera del AMG, borde punteado, relleno tenue
const PALETTE_FORANEA = [
  '#e63946', // rojo vino
  '#2a9d8f', // verde azulado
  '#f4a261', // durazno
  '#6a4c93', // indigo
  '#43aa8b', // jade
  '#d62828', // rojo profundo
  '#f72585', // fuchsia
  '#fb8500', // naranja quemado
  '#a8e6cf', // menta
  '#9b5de5', // purpura
  '#00bbf9', // cian brillante
  '#ffb703', // ambar
];

function getLocalColor(i)   { return PALETTE_LOCAL[i % PALETTE_LOCAL.length]; }
function getForaneaColor(i) { return PALETTE_FORANEA[i % PALETTE_FORANEA.length]; }

// ---------- ESTADO ----------
const state = {
  locales:  { layers: [], items: [], visible: true },
  foraneas: { layers: [], items: [], visible: true },
  active: null,
};

// ---------- SIDEBAR: render grupos ----------
function renderSidebar() {
  const list = document.getElementById('zone-list');
  list.innerHTML = '';

  list.appendChild(buildGroup('locales', 'Coberturas Locales', ZONE_DATA.locales));
  list.appendChild(buildGroup('foraneas', 'Coberturas Foráneas', ZONE_DATA.foraneas));
}

function buildGroup(key, title, zones) {
  const group = document.createElement('div');
  group.className = 'zone-group';
  group.dataset.key = key;

  const header = document.createElement('div');
  header.className = 'group-header ' + key;

  header.innerHTML =
    '<div class="group-title">' +
      '<div class="group-swatch"></div>' +
      title +
    '</div>' +
    '<div class="group-actions">' +
      '<span class="group-count">' + zones.length + '</span>' +
      '<div class="group-toggle on" title="Mostrar/ocultar"></div>' +
    '</div>';

  const items = document.createElement('div');
  items.className = 'group-items';

  group.appendChild(header);
  group.appendChild(items);

  // Toggle visibilidad
  header.querySelector('.group-toggle').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleGroup(key);
  });
  // Colapsar/expandir lista
  header.addEventListener('click', () => {
    items.classList.toggle('hidden');
  });

  return group;
}

// ---------- DIBUJAR POLIGONOS ----------
function drawZones() {
  // Locales
  ZONE_DATA.locales.forEach((z, i) => {
    const color = getLocalColor(i);
    const layer = L.polygon(z.polygons, {
      color: color,
      weight: 2.2,
      opacity: 0.95,
      fillColor: color,
      fillOpacity: 0.28,
    }).addTo(map);

    layer.bindPopup(
      '<div class="popup-label">Cobertura local</div>' +
      '<div class="popup-zone-name">' + escapeHtml(z.name) + '</div>',
      { className: '' }
    );
    layer.on('click', () => activate('locales', i));
    state.locales.layers.push(layer);

    const item = addZoneToSidebar('locales', z.name, color, i, false);
    state.locales.items.push(item);
  });

  // Foraneas (estilo distinto: borde punteado, fill mas tenue)
  ZONE_DATA.foraneas.forEach((z, i) => {
    const color = getForaneaColor(i);
    const layer = L.polygon(z.polygons, {
      color: color,
      weight: 2.6,
      opacity: 0.95,
      dashArray: '8,6',
      fillColor: color,
      fillOpacity: 0.14,
    }).addTo(map);

    layer.bindPopup(
      '<div class="popup-label">Cobertura foránea</div>' +
      '<div class="popup-zone-name foranea">' + escapeHtml(z.name) + '</div>',
      { className: 'foranea-popup-wrapper' }
    );
    // Aplicar clase al abrir
    layer.on('popupopen', (e) => {
      const wrap = e.popup.getElement().querySelector('.leaflet-popup-content-wrapper');
      if (wrap) wrap.classList.add('foranea-popup');
    });
    layer.on('click', () => activate('foraneas', i));
    state.foraneas.layers.push(layer);

    const item = addZoneToSidebar('foraneas', z.name, color, i, true);
    state.foraneas.items.push(item);
  });

  // Actualizar badges
  document.getElementById('badge-locales-count').textContent = ZONE_DATA.locales.length;
  document.getElementById('badge-foraneas-count').textContent = ZONE_DATA.foraneas.length;

  // Fit bounds combinados
  const allLayers = [...state.locales.layers, ...state.foraneas.layers];
  if (allLayers.length) {
    const group = L.featureGroup(allLayers);
    map.fitBounds(group.getBounds(), { padding: [50, 50] });
  }
}

function addZoneToSidebar(key, name, color, idx, isForanea) {
  const group = document.querySelector('.zone-group[data-key="' + key + '"] .group-items');
  const item = document.createElement('div');
  item.className = 'zone-item' + (isForanea ? ' foranea' : '');

  const dotClass = isForanea ? 'zone-dot foranea' : 'zone-dot';
  const dotStyle = isForanea
    ? 'color:' + color + ';'
    : 'background:' + color + ';';

  item.innerHTML =
    '<div class="' + dotClass + '" style="' + dotStyle + '"></div>' +
    '<div class="zone-name">' + escapeHtml(name) + '</div>';

  item.addEventListener('click', () => activate(key, idx));
  group.appendChild(item);
  return item;
}

// ---------- ACTIVAR ZONA ----------
function activate(key, idx) {
  // Limpia anterior
  document.querySelectorAll('.zone-item.active').forEach(el => el.classList.remove('active'));
  state.active = { key, idx };

  const item = state[key].items[idx];
  const layer = state[key].layers[idx];
  if (item) item.classList.add('active');
  if (layer) {
    map.fitBounds(layer.getBounds(), { padding: [60, 60], maxZoom: 13 });
    layer.openPopup();
  }
}

// ---------- TOGGLE GRUPO ----------
function toggleGroup(key) {
  const grp = state[key];
  grp.visible = !grp.visible;
  grp.layers.forEach(l => {
    if (grp.visible) l.addTo(map);
    else map.removeLayer(l);
  });
  const toggle = document.querySelector('.group-header.' + key + ' .group-toggle');
  if (toggle) toggle.classList.toggle('on', grp.visible);
}

// ---------- UTILS ----------
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ---------- SIDEBAR COLLAPSE ----------
document.getElementById('collapse-btn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('collapsed');
  document.getElementById('open-sidebar-btn').classList.add('visible');
  map.invalidateSize();
});
document.getElementById('open-sidebar-btn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('collapsed');
  document.getElementById('open-sidebar-btn').classList.remove('visible');
  map.invalidateSize();
});

// ---------- INIT ----------
renderSidebar();
drawZones();

setTimeout(() => {
  document.getElementById('loader').classList.add('hidden');
}, 300);
</script>
</body>
</html>
